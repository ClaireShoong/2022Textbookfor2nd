<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어Ⅰ (천재) Lesson 1-6 - 안정 버전</title>
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; }
    body { font-family: 'Pretendard', system-ui, sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; line-height:1.6; }
    header { background: linear-gradient(135deg, #2563eb, #1e40af); color:white; padding:1.5rem; text-align:center; }
    .container { max-width: 1100px; margin:20px auto; padding:0 15px; }
    .tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    .tab-btn { flex:1; padding:14px; background:white; border:2px solid #e2e8f0; border-radius:15px; font-weight:700; cursor:pointer; min-width:150px; }
    .tab-btn.active { background:var(--primary); color:white; border-color:var(--primary); }

    .content-section { display:none; }
    .content-section.active { display:block; }

    .flashcard { background:white; height:220px; border:2px solid #e2e8f0; border-radius:20px; cursor:pointer; margin:15px 0; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
    .card-inner { position:relative; width:100%; height:100%; transition:transform 0.6s; transform-style:preserve-3d; }
    .flashcard.flipped .card-inner { transform:rotateY(180deg); }
    .card-front, .card-back { position:absolute; width:100%; height:100%; backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:20px; padding:20px; }
    .card-front { border:2px solid #e2e8f0; }
    .card-back { background:#2563eb; color:white; transform:rotateY(180deg); }
    .card-word { font-size:1.75rem; font-weight:800; color:#1e40af; }

    .listen-box, .grammar-box { background:white; padding:30px; border-radius:20px; border:1px solid #e2e8f0; max-width:700px; margin:0 auto; }
    .quiz-choice-btn { display:block; width:100%; padding:16px; margin:10px 0; border:2px solid #e2e8f0; border-radius:12px; background:white; font-size:1.05rem; cursor:pointer; text-align:left; }
    .quiz-choice-btn.correct { background:#dcfce7; border-color:#10b981; }
    .quiz-choice-btn.wrong { background:#fee2e2; border-color:#ef4444; }

    .reading-box { background:white; padding:35px; border-radius:20px; line-height:2; font-size:1.08rem; border:1px solid #e2e8f0; }
    .read-btn { background:#eff6ff; border:1px solid #2563eb; color:#2563eb; width:38px; height:38px; border-radius:50%; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; margin-right:10px; vertical-align:middle; }
  </style>
</head>
<body>

<header>
  <h1>영어Ⅰ (천재) Lesson 1-6</h1>
  <select id="lessonSelect" onchange="changeLesson()" style="padding:12px 20px; font-size:1.1rem; border-radius:12px; margin-top:10px; width:95%; max-width:500px;">
    <option value="L1">L1: For a Satisfying Life</option>
    <option value="L2">L2: Creativity Is Key</option>
    <option value="L3">L3: In Harmony with Nature</option>
    <option value="L4">L4: The Spirit of Sports</option>
    <option value="L5">L5: Explore the Amazing World</option>
    <option value="L6">L6: Art in Our Lives</option>
  </select>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('vocab')">🃏 단어 카드</button>
    <button class="tab-btn" onclick="openTab('listen')">🔊 듣고 고르기</button>
    <button class="tab-btn" onclick="openTab('grammar')">🧩 문장 게임</button>
    <button class="tab-btn" onclick="openTab('reading')">📖 읽기</button>
  </div>

  <div id="vocab" class="content-section active"><div id="vocabList" class="flashcard-container" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div></div>
  <div id="listen" class="content-section"><div id="listenArea" class="listen-box"></div></div>
  <div id="grammar" class="content-section"><div id="grammarArea" class="grammar-box"></div></div>
  <div id="reading" class="content-section"><div id="readingContent" class="reading-box"></div></div>
</div>

<script>
// ==================== 원본 lessons 데이터 그대로 복사해서 여기에 붙여넣기 ====================
const lessons = {
  // ←←← 여기부터 원본 파일의 const lessons = { ... }; 전체를 그대로 붙여넣으세요
  // L1부터 L6까지 모두 포함해야 합니다.
};

// (데이터가 매우 길기 때문에 여기 생략. 원본에서 복사 필수!)

let currentLesson = 'L1';
let currentListenIndex = 0;

// 탭 전환
function openTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  
  document.querySelector(`button[onclick="openTab('${tab}')"]`).classList.add('active');
  document.getElementById(tab).classList.add('active');

  if (tab === 'vocab') renderVocabCards();
  if (tab === 'listen') renderListenMode();
  if (tab === 'grammar') renderGrammarMode();
  if (tab === 'reading') renderReading();
}

// 레슨 변경
function changeLesson() {
  currentLesson = document.getElementById('lessonSelect').value;
  currentListenIndex = 0;
  openTab('vocab');
}

// TTS
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  speechSynthesis.speak(utterance);
}

// ==================== 1. 단어 카드 ====================
function renderVocabCards() {
  const vocab = lessons[currentLesson].vocab || [];
  let html = '';
  vocab.forEach(item => {
    html += `
      <div class="flashcard" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-word">${item.word}</div>
            <div style="margin-top:10px;font-size:0.95rem;color:#64748b;">${item.pos}</div>
            <button onclick="event.stopImmediatePropagation(); speak('${item.word}')" style="margin-top:15px;padding:8px 18px;background:#dbeafe;border:none;border-radius:9999px;cursor:pointer;">🔊 발음 듣기</button>
          </div>
          <div class="card-back">
            <div style="font-size:1.35rem;font-weight:700;">${item.meaningKo}</div>
            <div style="margin-top:12px;font-size:0.95rem;opacity:0.9;">${item.example || ''}</div>
          </div>
        </div>
      </div>`;
  });
  document.getElementById('vocabList').innerHTML = html;
}

// ==================== 2. 듣고 고르기 ====================
function renderListenMode() {
  const vocab = lessons[currentLesson].vocab || [];
  if (currentListenIndex >= vocab.length) {
    document.getElementById('listenArea').innerHTML = `<h3 style="text-align:center;color:#10b981;">🎉 ${currentLesson} 듣고 고르기 완료!</h3><button onclick="currentListenIndex=0;renderListenMode()" style="display:block;margin:20px auto;padding:12px 30px;background:#2563eb;color:white;border:none;border-radius:12px;">다시 하기</button>`;
    return;
  }

  const item = vocab[currentListenIndex];
  let options = [item.meaningKo];
  const allMeanings = vocab.map(v => v.meaningKo).filter(m => m !== item.meaningKo);
  options = options.concat(allMeanings.sort(() => Math.random()-0.5).slice(0, 3));
  options = options.sort(() => Math.random()-0.5);

  let html = `
    <h3 style="text-align:center;">🔊 듣고 뜻 고르기</h3>
    <div style="text-align:center;margin:25px 0;">
      <button onclick="speak('${item.word}')" style="font-size:2rem;padding:15px 40px;background:#2563eb;color:white;border:none;border-radius:9999px;cursor:pointer;">🔊 ${item.word} 발음 듣기</button>
    </div>
    <p style="text-align:center;color:#64748b;">위 단어의 한국어 뜻을 고르세요</p>
    <div id="listenOptions">`;

  options.forEach(opt => {
    html += `<button class="quiz-choice-btn" onclick="checkListenAnswer(this, '${opt}', '${item.meaningKo}')">${opt}</button>`;
  });

  html += `</div><div id="listenMsg" style="height:40px;margin-top:15px;text-align:center;font-weight:700;"></div>`;
  document.getElementById('listenArea').innerHTML = html;
}

window.checkListenAnswer = function(btn, selected, correct) {
  const msg = document.getElementById('listenMsg');
  document.querySelectorAll('#listenOptions button').forEach(b => b.disabled = true);

  if (selected === correct) {
    btn.classList.add('correct');
    msg.innerHTML = `<span style="color:#10b981">정답입니다! 🎉</span>`;
    setTimeout(() => { currentListenIndex++; renderListenMode(); }, 1300);
  } else {
    btn.classList.add('wrong');
    msg.innerHTML = `<span style="color:#ef4444">오답입니다.</span> 정답: <b>${correct}</b>`;
  }
};

// ==================== 3. 문장 게임 ====================
function renderGrammarMode() {
  const patterns = lessons[currentLesson].grammarPatterns || [];
  let html = `<h3 style="text-align:center;">🧩 ${currentLesson} 문장 게임</h3><p style="text-align:center;color:#64748b;">한국어 뜻을 보고 알맞은 영어 문장을 고르세요</p>`;

  patterns.forEach((p, i) => {
    html += `
      <div style="background:white;padding:25px;border-radius:16px;margin:20px 0;border:1px solid #e2e8f0;">
        <div style="font-weight:700;margin-bottom:12px;">${p.meaning}</div>
        <div style="color:#1e40af;font-size:1.05rem;">${p.sentence}</div>
        <div style="margin-top:15px;font-size:0.9rem;color:#64748b;">${p.formula}</div>
      </div>`;
  });

  document.getElementById('grammarArea').innerHTML = html || '<p>문장 게임 데이터가 없습니다.</p>';
}

// ==================== 4. 읽기 ====================
function renderReading() {
  const text = lessons[currentLesson].readingText || '<p>읽기 본문이 없습니다.</p>';
  document.getElementById('readingContent').innerHTML = text;
}

// 초기 실행
window.onload = () => {
  if (!lessons.L1) {
    alert("lessons 데이터가 없습니다.\n원본 파일에서 lessons 객체 전체를 복사해서 코드에 붙여넣어 주세요.");
  }
  changeLesson();
};
</script>
</body>
</html>
